{% extends "filmes/index.html" %}
{% load static %}

{% block titulo %}
    Editar Comentário
{% endblock %}

{% block informacao %}
    {% if message %}
        <p id="message"><strong>{{ message }}</strong></p>
        <script>
            setTimeout(() => {
                const Message = document.getElementById('message');
                Message.classList.add('hide');
            }, 1000);
        </script>
    {% endif %}
{% endblock %}

{%  block conteudo %}
    <form action="{% url 'filmes:editarcomentario' filme_id %}" method="post">
        {% csrf_token %}
        <p>Avaliação:</p>
        <div class="stars">
          <input type="radio" id="star1" name="avaliacao" value="1"/>
            <label for="star1">&#9733</label>
          <input type="radio" id="star2" name="avaliacao" value="2"/>
            <label for="star2">&#9733</label>
          <input type="radio" id="star3" name="avaliacao" value="3"/>
            <label for="star3">&#9733</label>
          <input type="radio" id="star4" name="avaliacao" value="4"/>
            <label for="star4">&#9733</label>
          <input type="radio" id="star5" name="avaliacao" value="5"/>
            <label for="star5">&#9733</label>
        </div>
            <br>
        <label for="texto_comentario">Comentário(opcional):</label><br>
        <textarea id="texto_comentario" name="texto_comentario" rows="4" cols="50" placeholder="{{comentario.texto}}"></textarea><br>
        <input type="submit" value="Editar avaliação" style="border: 1px solid #b9b9b9; background-color: #444444;"/>
    </form>
    <script>
        atualizarRating(parseInt("{{comentario.avaliacao}}"));
        iniciartRating();
    </script>
    <br>
    <a href="{% url 'filmes:avaliacao' filme_id %}">Voltar</a>
{% endblock %}
